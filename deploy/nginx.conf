# ─────────────────────────────────────────────────────────────────────────────
# Epicenter Nexus — Nginx reverse-proxy + load balancer
#
# Place this file at /etc/nginx/sites-available/nexus (Linux) or
# copy into the Nginx conf/ directory on Windows, then:
#
#   nginx -t          # test config
#   nginx -s reload   # apply without downtime
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate-limiting zones (stored in shared memory) ────────────────────────────
# General zone: 120 req/min per IP  (~2 req/s)
limit_req_zone $binary_remote_addr zone=nexus_general:10m rate=120r/m;

# Strict zone for write endpoints: 20 req/min per IP
limit_req_zone $binary_remote_addr zone=nexus_write:10m   rate=20r/m;

# ── Upstream workers ─────────────────────────────────────────────────────────
upstream nexus_workers {
    # Round-robin by default.  Add "least_conn;" for least-connections strategy.
    least_conn;

    server 127.0.0.1:8001 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8002 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8003 max_fails=3 fail_timeout=30s;

    # Keep up to 32 idle connections per worker in the Nginx connection pool
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name epicenternexus.com www.epicenternexus.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name epicenternexus.com www.epicenternexus.com;

    # ── TLS (replace with your actual cert paths) ───────────────────────────
    ssl_certificate     /etc/ssl/certs/nexus.crt;
    ssl_certificate_key /etc/ssl/private/nexus.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    client_max_body_size    10m;
    client_body_timeout     12s;
    client_header_timeout   12s;
    keepalive_timeout       65s;
    send_timeout            10s;
    proxy_connect_timeout   10s;
    proxy_send_timeout      30s;
    proxy_read_timeout      30s;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip                on;
    gzip_comp_level     5;
    gzip_min_length     1024;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           SAMEORIGIN        always;
    add_header X-Content-Type-Options    nosniff           always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static files served directly by Nginx ────────────────────────────────
    location /static/ {
        alias /path/to/nexus/staticfiles/;   # update to your STATIC_ROOT
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    location /media/ {
        alias /path/to/nexus/media/;         # update to your MEDIA_ROOT
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Health check (no rate limit, no logging) ──────────────────────────────
    location = /health/ {
        proxy_pass         http://nexus_workers;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    # ── Write endpoints — stricter rate limit ─────────────────────────────────
    location ~ ^/(interact|article/comment|preferences)/ {
        limit_req zone=nexus_write burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://nexus_workers;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── All other requests ────────────────────────────────────────────────────
    location / {
        limit_req zone=nexus_general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://nexus_workers;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Cache GET responses for 10s at the Nginx layer
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 429 /429.html;
    error_page 502 503 504 /50x.html;

    location = /429.html {
        internal;
        return 429 '{"error":"Too many requests — please slow down."}';
        add_header Content-Type application/json;
    }

    location = /50x.html {
        internal;
        return 503 '{"error":"Service temporarily unavailable."}';
        add_header Content-Type application/json;
    }

    # ── Access & error logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/nexus_access.log combined buffer=16k;
    error_log  /var/log/nginx/nexus_error.log warn;
}
