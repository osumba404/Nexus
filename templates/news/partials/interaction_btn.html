{% comment %}
Renders a single like or bookmark toggle button.
Works via HTMX POST — swaps itself on success.
The CSRF token is injected globally via htmx:configRequest in base.html.
{% endcomment %}
{% if interaction_type == 'like' %}
<button
  hx-post="/interact/"
  hx-target="this"
  hx-swap="outerHTML"
  hx-vals='{"type":"like","url":"{{ url|escapejs }}","title":"{{ title|escapejs }}","excerpt":"{{ excerpt|truncatechars:300|escapejs }}","image_url":"{{ image_url|escapejs }}","source_name":"{{ source_name|escapejs }}","published_at":"{{ published_at|escapejs }}","category":"{{ category|escapejs }}"}'
  title="{{ active|yesno:'Unlike,Like this article' }}"
  class="p-1 rounded transition-colors {% if active %}text-red-400 hover:text-red-300{% else %}text-gray-500 hover:text-red-400{% endif %}">
  <svg class="w-4 h-4" fill="{% if active %}currentColor{% else %}none{% endif %}" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
  </svg>
</button>
{% else %}
<button
  hx-post="/interact/"
  hx-target="this"
  hx-swap="outerHTML"
  hx-vals='{"type":"bookmark","url":"{{ url|escapejs }}","title":"{{ title|escapejs }}","excerpt":"{{ excerpt|truncatechars:300|escapejs }}","image_url":"{{ image_url|escapejs }}","source_name":"{{ source_name|escapejs }}","published_at":"{{ published_at|escapejs }}","category":"{{ category|escapejs }}"}'
  title="{{ active|yesno:'Remove bookmark,Bookmark this article' }}"
  class="p-1 rounded transition-colors {% if active %}text-blue-400 hover:text-blue-300{% else %}text-gray-500 hover:text-blue-400{% endif %}">
  <svg class="w-4 h-4" fill="{% if active %}currentColor{% else %}none{% endif %}" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
  </svg>
</button>
{% endif %}
