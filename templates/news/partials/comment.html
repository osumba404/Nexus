{% load static %}
<div class="flex gap-3 group" id="comment-{{ comment.pk }}">

  <!-- Avatar -->
  <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0 mt-0.5">
    {{ comment.user.username|slice:":1"|upper }}
  </div>

  <!-- Body -->
  <div class="flex-1 min-w-0">
    <div class="flex items-center gap-2 mb-1">
      <span class="text-sm font-semibold nex-text">{{ comment.user.username }}</span>
      <span class="text-xs nex-text-muted">{{ comment.created_at|timesince }} ago</span>
    </div>
    <p class="text-sm nex-text-secondary leading-relaxed">{{ comment.text }}</p>
  </div>

  <!-- Delete (own comments only) -->
  {% if user == comment.user %}
  <button
    hx-post="/article/comment/{{ comment.pk }}/delete/"
    hx-target="#comment-{{ comment.pk }}"
    hx-swap="outerHTML swap:0.2s"
    hx-confirm="Delete this comment?"
    title="Delete comment"
    class="opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 p-1 text-gray-500 hover:text-red-400 mt-0.5">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
    </svg>
  </button>
  {% endif %}
</div>
