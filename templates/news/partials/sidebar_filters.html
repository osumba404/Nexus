<!-- Sidebar filter panel -->
<div class="nex-card rounded-xl p-4 sticky top-20">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-sm font-semibold nex-text">Filters</h2>
    {# Plain link — forces a full page reload so ALL state (URL, sidebar, feed) resets cleanly #}
    <a href="/" class="text-xs text-blue-500 hover:text-blue-600 transition-colors font-medium">
      Clear all
    </a>
  </div>

  <form method="GET" action="/" id="filter-form" class="space-y-4">

    <!-- Continent -->
    <div>
      <label class="block text-xs font-medium nex-text-muted mb-1.5" for="sel-continent">Continent</label>
      <select name="continent" id="sel-continent"
              class="w-full nex-input rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
              onchange="nexusSubmitFilters()">
        {% for val, label in continents %}
          <option value="{{ val }}" {% if filters.continent == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Country -->
    <div>
      <label class="block text-xs font-medium nex-text-muted mb-1.5" for="sel-country">Country</label>
      <select name="country" id="sel-country"
              class="w-full nex-input rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
              onchange="nexusSubmitFilters()">
        {% for val, label in countries %}
          <option value="{{ val }}" {% if filters.country == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Category -->
    <div>
      <label class="block text-xs font-medium nex-text-muted mb-1.5" for="sel-category">Category</label>
      <select name="category" id="sel-category"
              class="w-full nex-input rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
              onchange="nexusSubmitFilters()">
        <option value="">All Categories</option>
        {% for cat in categories %}
          <option value="{{ cat }}" {% if filters.category == cat %}selected{% endif %}>{{ cat|title }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Language -->
    <div>
      <label class="block text-xs font-medium nex-text-muted mb-1.5" for="sel-language">Language</label>
      <select name="language" id="sel-language"
              class="w-full nex-input rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
              onchange="nexusSubmitFilters()">
        <option value="en" {% if filters.language == 'en' or not filters.language %}selected{% endif %}>English</option>
        <option value="fr" {% if filters.language == 'fr' %}selected{% endif %}>French</option>
        <option value="sw" {% if filters.language == 'sw' %}selected{% endif %}>Swahili</option>
        <option value="ar" {% if filters.language == 'ar' %}selected{% endif %}>Arabic</option>
        <option value="es" {% if filters.language == 'es' %}selected{% endif %}>Spanish</option>
        <option value="pt" {% if filters.language == 'pt' %}selected{% endif %}>Portuguese</option>
        <option value="de" {% if filters.language == 'de' %}selected{% endif %}>German</option>
        <option value="zh" {% if filters.language == 'zh' %}selected{% endif %}>Chinese</option>
      </select>
    </div>

    <!-- Date range -->
    <div>
      <label class="block text-xs font-medium nex-text-muted mb-1.5">Date Range</label>
      <div class="space-y-2">
        <input type="date" name="from_date" value="{{ filters.from_date|default:'' }}"
               aria-label="From date"
               class="w-full nex-input rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500" />
        <input type="date" name="to_date" value="{{ filters.to_date|default:'' }}"
               aria-label="To date"
               class="w-full nex-input rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500" />
      </div>
    </div>

    <!-- Sort by -->
    <div>
      <label class="block text-xs font-medium nex-text-muted mb-1.5" for="sel-sort">Sort By</label>
      <select name="sort_by" id="sel-sort"
              class="w-full nex-input rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
              onchange="nexusSubmitFilters()">
        {% for val, label in sort_options %}
          <option value="{{ val }}" {% if filters.sort_by == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Apply button (useful after changing date range) -->
    <button type="button" onclick="nexusSubmitFilters()"
            class="w-full py-2.5 text-sm bg-blue-600 hover:bg-blue-500 text-white
                   rounded-lg font-medium transition-colors">
      Apply Filters
    </button>

  </form>

  <!-- Quick topic pills -->
  <div class="mt-5 pt-4 nex-border-top">
    <p class="text-xs font-medium nex-text-muted mb-2">Quick Topics</p>
    <div class="flex flex-wrap gap-1.5" role="list" aria-label="Quick topic filters">
      {% for topic in quick_topics %}
        <button type="button"
                role="listitem"
                class="topic-pill text-xs px-2.5 py-1 rounded-full border transition-colors
                  {% if filters.category == topic %}
                    bg-blue-600 border-blue-500 text-white
                  {% else %}
                    bg-navy-800 border-navy-600 text-gray-400 hover:border-blue-500 hover:text-blue-300
                  {% endif %}"
                data-topic="{{ topic }}"
                aria-label="Filter by {{ topic }}"
                onclick="nexusSelectTopic('{{ topic }}')">
          {{ topic|title }}
        </button>
      {% endfor %}
    </div>
  </div>
</div>
