<!-- Single article card -->
<article class="bg-navy-900 border border-navy-700 rounded-xl overflow-hidden hover:border-blue-500/50 hover:shadow-lg hover:shadow-blue-900/20 transition-all group">
  {% if article.image_url %}
  <a href="{{ article.url }}" target="_blank" rel="noopener noreferrer" class="block overflow-hidden h-44">
    <img
      src="{{ article.image_url }}"
      alt="{{ article.title }}"
      loading="lazy"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
      onerror="this.parentElement.style.display='none'"
    />
  </a>
  {% endif %}

  <div class="p-4 flex flex-col gap-2">
    <!-- Category + time -->
    <div class="flex items-center justify-between text-xs text-gray-500">
      <span class="bg-navy-800 border border-navy-600 px-2 py-0.5 rounded-full uppercase tracking-wide font-medium text-blue-300">
        {{ article.category|default:"News" }}
      </span>
      <time datetime="{{ article.published_at }}">{{ article.published_at|slice:":10" }}</time>
    </div>

    <!-- Title -->
    <h2 class="text-sm font-semibold text-white leading-snug line-clamp-3 group-hover:text-blue-300 transition-colors">
      <a href="{{ article.url }}" target="_blank" rel="noopener noreferrer">
        {{ article.title }}
      </a>
    </h2>

    <!-- Excerpt -->
    {% if article.excerpt %}
    <p class="text-xs text-gray-400 leading-relaxed line-clamp-2">
      {{ article.excerpt|truncatechars:160 }}
    </p>
    {% endif %}

    <!-- Footer: source + read link -->
    <div class="flex items-center justify-between mt-auto pt-2 border-t border-navy-700">
      <span class="text-xs text-gray-500 font-medium truncate max-w-[60%]">
        {{ article.source_name }}
      </span>
      <a href="{{ article.url }}" target="_blank" rel="noopener noreferrer"
         class="text-xs text-blue-400 hover:text-blue-300 flex items-center gap-1 transition-colors flex-shrink-0">
        Read full
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
      </a>
    </div>
  </div>
</article>
