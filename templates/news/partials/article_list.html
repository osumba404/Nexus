<!-- Article list partial — appended on "load more" (page > 1) -->
{% for article in articles %}
  {% include "news/partials/article_card.html" %}
{% empty %}
  <!-- empty state handled by feed_container -->
{% endfor %}

{% if has_more %}
<div class="col-span-full flex justify-center pt-2"
     id="load-more-{{ current_page }}">
  <button
    hx-get="/feed/?{% for k,v in filters.items %}{% if v and k != 'page' %}{{ k }}={{ v|urlencode }}&{% endif %}{% endfor %}page={{ current_page|add:1 }}"
    hx-target="#load-more-{{ current_page }}"
    hx-swap="outerHTML"
    hx-indicator="#spinner"
    class="nex-btn-secondary px-6 py-2.5 text-sm rounded-lg transition-all">
    Load more articles
  </button>
</div>
{% endif %}
